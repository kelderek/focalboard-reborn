name: CI — agent PR validation

on:
  pull_request:
    branches: [main]

jobs:
  # ── Go backend ───────────────────────────────────────────────────────────────
  backend:
    name: Go tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Build
        run: cd server && go build ./...

      - name: Test
        run: cd server && go test ./... -v -count=1 -timeout=120s

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: server
          version: latest

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Node tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - run: cd webapp && npm ci

      - name: Test
        run: cd webapp && npm test -- --watchAll=false --ci

      - name: Lint
        run: cd webapp && npm run lint

      - name: Type check
        run: cd webapp && npx tsc --noEmit

  # ── Claude Code review on agent PRs ──────────────────────────────────────────
  claude-review:
    name: Claude Code review
    runs-on: ubuntu-latest
    # Only run review on PRs opened by the bot
    if: contains(github.event.pull_request.body, 'Generated by Claude Code agent')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_PAT }}
          prompt: |
            Review this PR for correctness, security issues, and code quality.
            Focus on:
            1. Does the fix actually address the issue described in the PR body?
            2. Are there any security concerns (input validation, auth bypasses, injection)?
            3. Are existing tests sufficient, or should new ones be added?
            4. Does the code follow the patterns in CLAUDE.md?
            5. Are there any edge cases not handled?

            Post a concise review comment. Approve if the change looks good.
            Request changes if there are real issues. Do not nitpick style.
