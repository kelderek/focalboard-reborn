name: Agent loop — auto-resolve issues

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of issues to attempt'
        default: '3'
        type: string
      issue_number:
        description: 'Specific fork issue number (optional)'
        default: ''
        type: string

concurrency:
  group: agent-loop
  cancel-in-progress: false

jobs:
  plan:
    name: Plan batch
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
      count:   ${{ steps.pick.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - name: Pick next issues
        id: pick
        env:
          BATCH: ${{ inputs.batch_size || '3' }}
          ISSUE_NUMBER: ${{ inputs.issue_number || '' }}
        run: |
          if [ ! -f data/backlog.json ]; then
            echo "No backlog.json found in repo"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$ISSUE_NUMBER" ]; then
            ITEMS=$(jq -c --argjson n "$ISSUE_NUMBER" \
              '[.[] | select(.fork_issue_number == $n) | {fork_issue_number, title: .title}]' \
              data/backlog.json)
          else
            ITEMS=$(jq -c \
              '[to_entries[] | select(
                  .value.triage.auto_attempt == true and
                  .value.status == "open" and
                  .value.attempts < 3
                ) | {fork_issue_number: .value.fork_issue_number, title: .value.title}
              ] | .[:'"$BATCH"']' \
              data/backlog.json)
          fi

          COUNT=$(echo "$ITEMS" | jq length)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "matrix={\"include\":$(echo "$ITEMS")}" >> "$GITHUB_OUTPUT"
          echo "Planned $COUNT issues"

  fix:
    name: Fix issue #${{ matrix.fork_issue_number }}
    needs: plan
    if: needs.plan.outputs.count > 0
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
      fail-fast: false
      max-parallel: 1

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install webapp deps
        run: cd webapp && npm ci --prefer-offline

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name  "focalboard-bot"
          git config user.email "bot@users.noreply.github.com"

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORK: ${{ github.repository }}
          ISSUE_NUMBER: ${{ matrix.fork_issue_number }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          BACKLOG: data/backlog.json
        run: |
          chmod +x scripts/04_agent_loop.sh
          ./scripts/04_agent_loop.sh

          # Auto-merge any PR the agent opened for this issue
          PR=$(gh pr list --repo "$FORK" \
            --json number,headRefName \
            --jq "[.[] | select(.headRefName | startswith(\"fix/issue-${{ matrix.fork_issue_number }}\") or startswith(\"feat/issue-${{ matrix.fork_issue_number }}\"))] | .[0].number // empty")
          [ -n "$PR" ] && gh pr merge "$PR" --auto --squash || true

      - name: Commit updated backlog
        run: |
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add data/backlog.json
          git diff --cached --quiet || git commit -m "chore: update backlog after issue #${{ matrix.fork_issue_number }} [skip ci]"
          git push origin main || true

  summary:
    name: Post summary
    needs: fix
    if: always() && needs.plan.outputs.count > 0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Post summary comment
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ ! -f data/backlog.json ]; then exit 0; fi

          OPEN=$(jq '[.[] | select(.status=="open" and .triage.auto_attempt==true)] | length' data/backlog.json)
          DONE=$(jq '[.[] | select(.status=="done")] | length' data/backlog.json)
          FAIL=$(jq '[.[] | select(.status=="failed")] | length' data/backlog.json)
          HUMAN=$(jq '[.[] | select(.triage.auto_attempt==false)] | length' data/backlog.json)

          MSG="### 🤖 Agent run — $(date '+%Y-%m-%d')
          | Status | Count |
          |---|---|
          | ✅ Done | $DONE |
          | 🔄 Open (auto) | $OPEN |
          | ❌ Failed | $FAIL |
          | 👤 Human review | $HUMAN |

          Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Find or create status tracking issue (without --json flag for gh compatibility)
          STATUS_ISSUE=$(gh issue list \
            --label "status-tracker" \
            --state open \
            --jq '.[0].number' \
            --json number 2>/dev/null || echo "")

          if [ -z "$STATUS_ISSUE" ]; then
            STATUS_ISSUE=$(gh issue create \
              --title "🤖 Agent loop status tracker" \
              --body "This issue tracks automated runs." \
              --label "status-tracker" | grep -o '[0-9]*$')
          fi

          [ -n "$STATUS_ISSUE" ] && gh issue comment "$STATUS_ISSUE" --body "$MSG" || true
